task_id: oms-status-race-001
rung: 2
area: order lifecycle
seeded_state: >
  Concurrent status updates can leave an order in an inconsistent state;
  one integration test is red.
verifier: pytest tests/order/test_status_transition.py
regression_gates:
  - mypy src/orders/
  - ruff check src/orders/
  - pytest tests/order/ -q
reference: patches/oms-status-race-001.patch
expected_iters: 3-5
